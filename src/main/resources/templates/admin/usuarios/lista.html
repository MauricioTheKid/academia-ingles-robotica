<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Usuarios - Admin</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:'Segoe UI',sans-serif;background:#f7fafc;display:flex;}
        .sidebar{width:250px;background:#1a3a5c;min-height:100vh;padding:20px;color:white;}
        .sidebar h2{font-size:1.2rem;margin-bottom:25px;}
        .sidebar a{display:block;color:#e2e8f0;text-decoration:none;padding:10px;margin:5px 0;border-radius:6px;}
        .sidebar a:hover{background:#2c5282;}
        .main{flex:1;padding:30px;}
        .header{background:white;padding:20px;border-radius:10px;margin-bottom:25px;}
        h1{color:#1a3a5c;}
        table{width:100%;border-collapse:collapse;background:white;border-radius:10px;overflow:hidden;}
        th,td{padding:12px 15px;text-align:left;border-bottom:1px solid #e2e8f0;}
        th{background:#edf2f7;color:#2d3748;font-weight:600;}
        tr:hover{background:#f7fafc;}
        .badge{padding:4px 10px;border-radius:20px;font-size:0.8rem;}
        .badge-admin{background:#bee3f8;color:#2a4365;}
        .badge-profesor{background:#c6f6d5;color:#276749;}
        .badge-alumno{background:#fefcbf;color:#975a16;}
        .badge-padre{background:#e9d8fd;color:#553c9a;}
        .badge-activo{background:#c6f6d5;color:#276749;}
        .badge-inactivo{background:#fed7d7;color:#9b2c2c;}
        .btn{padding:6px 14px;border-radius:6px;text-decoration:none;font-size:0.8rem;font-weight:600;color:white;margin:0 2px;}
        .btn-edit{background:#3182ce;}
        .btn-delete{background:#e53e3e;}
        .page-active{background:#1a3a5c;color:white;}
        .page-normal{background:#e2e8f0;color:#2d3748;}
    </style>
</head>
<body>
    <div class="sidebar">
        <h2>⚙️ Admin Panel</h2>
        <a href="/admin/dashboard">📊 Dashboard</a>
        <a href="/admin/usuarios" style="background:#2c5282;">👥 Usuarios</a>
        <a href="/cursos">📚 Cursos</a>
        <a href="/horarios">🕐 Horarios</a>
        <a href="/perfil">👤 Mi Perfil</a>
        <a href="/auth/logout">🚪 Salir</a>
    </div>
    <div class="main">
        <div class="header"><h1>👥 Gestión de Usuarios</h1></div>
        <table>
            <thead>
                <tr>
                    <th>ID</th><th>Nombre</th><th>Email</th><th>Rol</th><th>Estado</th>
                    <th th:if="${session.usuarioEmail == 'admin@test.com'}">Acciones</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="usuario : ${usuarios}">
                    <td th:text="${usuario.id}">1</td>
                    <td th:text="${usuario.nombre} + ' ' + ${usuario.apellido}">Nombre</td>
                    <td th:text="${usuario.email}">Email</td>
                    <td>
                        <span th:if="${usuario.rol.nombre.contains('ADMIN')}" class="badge badge-admin">Admin</span>
                        <span th:if="${usuario.rol.nombre.contains('PROFESOR')}" class="badge badge-profesor">Profesor</span>
                        <span th:if="${usuario.rol.nombre.contains('ALUMNO')}" class="badge badge-alumno">Alumno</span>
                        <span th:if="${usuario.rol.nombre.contains('PADRE')}" class="badge badge-padre">Padre</span>
                    </td>
                    <td>
                        <span th:if="${usuario.activo}" class="badge badge-activo">Activo</span>
                        <span th:if="${!usuario.activo}" class="badge badge-inactivo">Inactivo</span>
                    </td>
                    <td th:if="${session.usuarioEmail == 'admin@test.com'}">
                        <a th:href="@{/admin/usuarios/editar/{id}(id=${usuario.id})}" class="btn btn-edit" title="Editar datos del usuario">✏️ Editar</a>
                        <a th:href="@{/admin/usuarios/eliminar/{id}(id=${usuario.id})}" class="btn btn-delete" onclick="return confirm('¿Eliminar este usuario?')" title="Eliminar usuario permanentemente">🗑️ Eliminar</a>
                    </td>
                </tr>
            </tbody>
        </table>
        <div style="text-align:center;margin-top:15px;">
            <span th:if="${currentPage > 0}">
                <a th:href="@{/admin/usuarios(page=${currentPage - 1})}" style="padding:6px 12px;background:#3182ce;color:white;text-decoration:none;border-radius:4px;margin:0 5px;">⬅ Anterior</a>
            </span>
            <span th:each="i : ${#numbers.sequence(0, totalPages - 1)}">
                <a th:href="@{/admin/usuarios(page=${i})}" th:class="${i == currentPage ? 'page-active' : 'page-normal'}" style="padding:6px 12px;margin:0 2px;text-decoration:none;border-radius:4px;" th:text="${i + 1}">1</a>
            </span>
            <span th:if="${currentPage < totalPages - 1}">
                <a th:href="@{/admin/usuarios(page=${currentPage + 1})}" style="padding:6px 12px;background:#3182ce;color:white;text-decoration:none;border-radius:4px;margin:0 5px;">Siguiente ➡</a>
            </span>
            <p style="margin-top:8px;color:#718096;">Total: <span th:text="${totalUsuarios}">0</span> usuarios | Página <span th:text="${currentPage + 1}">1</span> de <span th:text="${totalPages}">1</span></p>
        </div>
    </div>
</body>
</html>
