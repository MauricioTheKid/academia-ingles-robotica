<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Completar Inscripción - Academia San Luis</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; }
        .card { border-radius: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); }
        .btn-primary { background: linear-gradient(45deg, #667eea, #764ba2); border: none; border-radius: 50px; padding: 12px 30px; font-weight: bold; transition: transform 0.2s; }
        .btn-primary:hover { transform: scale(1.02); background: linear-gradient(45deg, #5a67d8, #6b46a0); }
    </style>
</head>
<body>
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card">
                    <div class="card-header bg-primary text-white text-center py-3" style="background: linear-gradient(45deg, #667eea, #764ba2) !important;">
                        <h3 class="mb-0"><i class="fas fa-user-graduate me-2"></i>Formulario de Inscripción</h3>
                        <p class="mb-0 mt-2">Completa tus datos para continuar</p>
                    </div>
                    <div class="card-body p-4">
                        <div th:if="${reserva}" class="alert alert-info">
                            <strong><i class="fas fa-book me-2"></i>Curso:</strong> <span th:text="${reserva.horario.curso.nombre}"></span><br>
                            <strong><i class="far fa-calendar-alt me-2"></i>Horario:</strong> <span th:text="${reserva.horario.diaSemana} + ' ' + ${reserva.horario.horaInicio} + ' - ' + ${reserva.horario.horaFin}"></span>
                        </div>

                        <form action="/inscripcion/guardar" method="post" th:object="${inscripcionRequest}">
                            <input type="hidden" name="reservaId" th:value="${reservaId}">

                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label fw-bold"><i class="fas fa-calendar"></i> Fecha de Nacimiento *</label>
                                    <input type="date" class="form-control" name="fechaNacimiento" required>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label fw-bold"><i class="fas fa-graduation-cap"></i> Grado Escolar *</label>
                                    <select class="form-select" name="gradoEscolar" required>
                                        <option value="">Selecciona...</option>
                                        <option>1° Básico</option>
                                        <option>2° Básico</option>
                                        <option>3° Básico</option>
                                        <option>4° Básico</option>
                                        <option>5° Básico</option>
                                        <option>6° Básico</option>
                                        <option>1° Medio</option>
                                        <option>2° Medio</option>
                                        <option>3° Medio</option>
                                        <option>4° Medio</option>
                                    </select>
                                </div>
                            </div>

                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label fw-bold"><i class="fas fa-phone"></i> Contacto de Emergencia *</label>
                                    <input type="text" class="form-control" name="contactoEmergencia" placeholder="Nombre completo" required>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label fw-bold"><i class="fas fa-mobile-alt"></i> Teléfono Emergencia *</label>
                                    <input type="tel" class="form-control" name="telefonoEmergencia" placeholder="Ej: 7890-1234" required>
                                </div>
                            </div>

                            <div class="mb-3">
                                <label class="form-label fw-bold"><i class="fas fa-allergies"></i> Alergias</label>
                                <textarea class="form-control" name="alergias" rows="2" placeholder="Ej: Ninguna, Penicilina, Polen, Mariscos..."></textarea>
                            </div>

                            <div class="mb-3">
                                <label class="form-label fw-bold"><i class="fas fa-heartbeat"></i> Condiciones Médicas</label>
                                <textarea class="form-control" name="condicionesMedicas" rows="2" placeholder="Ej: Asma, Diabetes, Hipertensión, Ninguna..."></textarea>
                            </div>

                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label fw-bold"><i class="fas fa-tshirt"></i> Talla de Uniforme</label>
                                    <select class="form-select" name="tallaUniforme">
                                        <option value="">Selecciona...</option>
                                        <option>XS</option>
                                        <option>S</option>
                                        <option>M</option>
                                        <option>L</option>
                                        <option>XL</option>
                                    </select>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label fw-bold"><i class="fas fa-camera"></i> Autorización de Fotos</label>
                                    <select class="form-select" name="autorizacionFoto">
                                        <option value="NO">No autorizo</option>
                                        <option value="SI">Sí autorizo</option>
                                    </select>
                                    <small class="text-muted">¿Autorizas el uso de fotos/videos en actividades escolares?</small>
                                </div>
                            </div>

                            <div class="alert alert-warning mt-3">
                                <i class="fas fa-info-circle me-2"></i>
                                <strong>Próximo paso:</strong> Después de guardar, deberás subir tu acta de nacimiento y comprobante de pago.
                            </div>

                            <div class="d-grid gap-2 mt-4">
                                <button type="submit" class="btn btn-primary btn-lg">
                                    <i class="fas fa-save me-2"></i>Guardar y Continuar
                                </button>
                                <a href="/reservas/mis-reservas" class="btn btn-secondary">
                                    <i class="fas fa-arrow-left me-2"></i>Cancelar
                                </a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
