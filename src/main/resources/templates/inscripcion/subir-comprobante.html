<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subir Comprobante - Academia San Luis</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; }
        .card { border-radius: 20px; }
        .upload-area { border: 2px dashed #dee2e6; border-radius: 15px; padding: 50px; text-align: center; cursor: pointer; }
        .upload-area:hover { border-color: #667eea; background: #f8f9fa; }
        .btn-primary { background: linear-gradient(45deg, #667eea, #764ba2); border: none; border-radius: 50px; }
    </style>
</head>
<body>
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card">
                    <div class="card-header bg-primary text-white text-center py-3" style="background: linear-gradient(45deg, #667eea, #764ba2) !important;">
                        <h3 class="mb-0"><i class="fas fa-file-invoice me-2"></i>Subir Comprobante de Pago</h3>
                    </div>
                    <div class="card-body p-4 text-center">
                        <div class="mb-4">
                            <i class="fas fa-receipt fa-4x text-primary mb-3"></i>
                            <h5>Inscripción #<span th:text="${inscripcion.id}"></span></h5>
                            <p class="text-muted">Curso: <strong th:text="${inscripcion.curso.nombre}"></strong></p>
                        </div>

                        <form action="/inscripcion/subir-comprobante/1" th:action="'/inscripcion/subir-comprobante/' + ${inscripcion.id}" method="post" enctype="multipart/form-data" id="comprobanteForm">
                            <div class="upload-area" onclick="document.getElementById('comprobanteInput').click();">
                                <i class="fas fa-cloud-upload-alt fa-4x text-primary mb-3"></i>
                                <h5>Haz clic para subir tu comprobante</h5>
                                <p class="text-muted">PDF, JPG o PNG (Máx. 10MB)</p>
                                <input type="file" name="archivo" id="comprobanteInput" accept=".pdf,.jpg,.jpeg,.png" style="display: none;" required onchange="document.getElementById('comprobanteForm').submit();">
                            </div>
                        </form>

                        <div class="alert alert-info mt-4">
                            <i class="fas fa-clock me-2"></i>
                            Una vez subido el comprobante, el administrador verificará el pago en un plazo de 24-48 horas.
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
