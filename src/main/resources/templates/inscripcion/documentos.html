<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subir Documentos - Academia San Luis</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; }
        .card { border-radius: 20px; }
        .upload-area { border: 2px dashed #dee2e6; border-radius: 15px; padding: 30px; text-align: center; transition: all 0.3s; cursor: pointer; }
        .upload-area:hover { border-color: #667eea; background: #f8f9fa; }
        .btn-primary { background: linear-gradient(45deg, #667eea, #764ba2); border: none; border-radius: 50px; }
    </style>
</head>
<body>
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card">
                    <div class="card-header bg-primary text-white text-center py-3" style="background: linear-gradient(45deg, #667eea, #764ba2) !important;">
                        <h3 class="mb-0"><i class="fas fa-file-alt me-2"></i>Documentos Requeridos</h3>
                    </div>
                    <div class="card-body p-4">
                        <div th:if="${inscripcion}" class="mb-4">
                            <div class="alert alert-info">
                                <strong>Inscripción #<span th:text="${inscripcion.id}"></span></strong><br>
                                Curso: <strong th:text="${inscripcion.curso.nombre}"></strong>
                            </div>
                        </div>

                        <!-- Acta de Nacimiento -->
                        <div class="mb-4">
                            <h5><i class="fas fa-birthday-cake text-primary me-2"></i>Acta de Nacimiento *</h5>
                            <form action="/inscripcion/subir-acta/1" th:action="'/inscripcion/subir-acta/' + ${inscripcion.id}" method="post" enctype="multipart/form-data" id="actaForm">
                                <div class="upload-area" onclick="document.getElementById('actaInput').click();">
                                    <i class="fas fa-cloud-upload-alt fa-3x text-primary mb-3"></i>
                                    <p class="mb-0">Haz clic para subir el acta de nacimiento (PDF o imagen)</p>
                                    <small class="text-muted">Máx. 5MB</small>
                                    <input type="file" name="archivo" id="actaInput" accept=".pdf,.jpg,.jpeg,.png" style="display: none;" onchange="document.getElementById('actaForm').submit();">
                                </div>
                            </form>
                            <div th:if="${inscripcion.actaNacimientoUrl != null}" class="mt-2 text-success">
                                <i class="fas fa-check-circle"></i> Acta subida correctamente
                                <a th:href="${inscripcion.actaNacimientoUrl}" target="_blank" class="btn btn-sm btn-link">Ver</a>
                            </div>
                        </div>

                        <hr>

                        <div class="d-flex justify-content-between mt-4">
                            <a href="/inscripcion/pago" th:href="'/inscripcion/pago/' + ${inscripcion.id}" class="btn btn-primary">
                                <i class="fas fa-arrow-right me-2"></i>Continuar al Pago
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
