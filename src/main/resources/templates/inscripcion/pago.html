<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Realizar Pago - Academia San Luis</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; }
        .card { border-radius: 20px; }
        .price { font-size: 2rem; font-weight: bold; color: #28a745; }
        .btn-primary { background: linear-gradient(45deg, #667eea, #764ba2); border: none; border-radius: 50px; padding: 12px 30px; }
        .btn-primary:hover { transform: scale(1.02); background: linear-gradient(45deg, #5a67d8, #6b46a0); }
    </style>
</head>
<body>
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card">
                    <div class="card-header bg-primary text-white text-center py-3" style="background: linear-gradient(45deg, #667eea, #764ba2) !important;">
                        <h3 class="mb-0"><i class="fas fa-credit-card me-2"></i>Realizar Pago</h3>
                    </div>
                    <div class="card-body p-4">
                        
                        <!-- Mensajes de éxito o error -->
                        <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
                        <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
                        
                        <div class="text-center mb-4">
                            <h4 th:text="${inscripcion.curso.nombre}">Curso</h4>
                            <p class="price">$ <span th:text="${inscripcion.curso.precio}">0</span></p>
                        </div>

                        <div class="alert alert-primary">
                            <h6><i class="fas fa-university me-2"></i>Datos de Transferencia</h6>
                            <hr>
                            <p class="mb-1"><strong>Banco:</strong> Banco San Luis</p>
                            <p class="mb-1"><strong>Cuenta Corriente:</strong> 123-456-789-0</p>
                            <p class="mb-1"><strong>RUT:</strong> 99.123.456-7</p>
                            <p class="mb-1"><strong>Razón Social:</strong> Academia San Luis S.A.</p>
                            <p class="mb-0"><strong>Email:</strong> pagos@academiasanluis.cl</p>
                        </div>

                        <form action="/inscripcion/registrar-pago" method="post" th:object="${pagoRequest}">
                            <input type="hidden" name="inscripcionId" th:value="${inscripcion.id}">
                            <input type="hidden" name="monto" th:value="${inscripcion.curso.precio}">

                            <div class="mb-3">
                                <label class="form-label fw-bold"><i class="fas fa-money-bill-wave me-2"></i>Método de Pago *</label>
                                <select class="form-select" name="metodoPago" required>
                                    <option value="">Selecciona...</option>
                                    <option value="TRANSFERENCIA">Transferencia Bancaria</option>
                                    <option value="TARJETA">Tarjeta de Crédito/Débito</option>
                                    <option value="EFECTIVO">Efectivo (en caja)</option>
                                </select>
                            </div>

                            <div class="mb-3">
                                <label class="form-label fw-bold"><i class="fas fa-hashtag me-2"></i>Referencia/Comprobante</label>
                                <input type="text" class="form-control" name="referenciaPago" placeholder="Ej: N° de transferencia o código de comprobante">
                            </div>

                            <div class="alert alert-warning">
                                <i class="fas fa-info-circle me-2"></i>
                                Después de realizar el pago, deberás subir el comprobante para que el administrador lo verifique.
                            </div>

                            <div class="d-grid gap-2 mt-4">
                                <button type="submit" class="btn btn-primary btn-lg">
                                    <i class="fas fa-check-circle me-2"></i>Registrar Pago
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
