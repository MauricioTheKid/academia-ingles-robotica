<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - Academia San Luis</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(135deg, #1a3a5c 0%, #2c5282 50%, #3182ce 100%); min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; }
        .register-container { background: white; border-radius: 16px; box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3); width: 100%; max-width: 520px; padding: 40px; }
        .register-header { text-align: center; margin-bottom: 25px; }
        .register-header h1 { color: #1a3a5c; font-size: 1.6rem; margin-bottom: 5px; }
        .register-header p { color: #718096; font-size: 0.9rem; }
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; color: #2d3748; font-weight: 600; margin-bottom: 4px; font-size: 0.85rem; }
        .form-group input, .form-group select { width: 100%; padding: 11px 14px; border: 2px solid #e2e8f0; border-radius: 8px; font-size: 0.95rem; transition: all 0.3s; }
        .form-group input:focus, .form-group select:focus { outline: none; border-color: #3182ce; box-shadow: 0 0 0 3px rgba(49, 130, 206, 0.2); }
        .form-group input.error { border-color: #e53e3e; background: #fff5f5; }
        .form-group input.success { border-color: #38a169; background: #f0fff4; }
        .form-row { display: flex; gap: 15px; }
        .form-row .form-group { flex: 1; }
        .btn-register { width: 100%; padding: 13px; background: linear-gradient(135deg, #2c5282, #3182ce); color: white; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: transform 0.2s; margin-top: 10px; }
        .btn-register:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(49, 130, 206, 0.4); }
        .alert { padding: 12px 15px; border-radius: 8px; margin-bottom: 20px; font-size: 0.85rem; }
        .alert-danger { background: #fff5f5; color: #c53030; border: 1px solid #feb2b2; }
        .error-msg { color: #e53e3e; font-size: 0.75rem; margin-top: 4px; display: none; }
        .login-link { text-align: center; margin-top: 20px; color: #718096; font-size: 0.85rem; }
        .login-link a { color: #3182ce; text-decoration: none; font-weight: 600; }
        .password-strength { height: 4px; border-radius: 2px; margin-top: 4px; transition: all 0.3s; background: #e2e8f0; }
    </style>
</head>
<body>
    <div class="register-container">
        <div class="register-header">
            <h1>🎓 Crear Cuenta</h1>
            <p>Academia de Inglés & Robótica - San Luis</p>
        </div>

        <div th:if="${error}" class="alert alert-danger">
            <span th:text="${error}">Error</span>
        </div>

        <form th:action="@{/auth/registro}" th:object="${registroRequest}" method="post" id="registroForm">
            <div class="form-row">
                <div class="form-group">
                    <label for="nombre">Nombre *</label>
                    <input type="text" id="nombre" th:field="*{nombre}" placeholder="Tu nombre" required minlength="2">
                    <div class="error-msg" id="nombreError">Mínimo 2 caracteres.</div>
                </div>
                <div class="form-group">
                    <label for="apellido">Apellido *</label>
                    <input type="text" id="apellido" th:field="*{apellido}" placeholder="Tu apellido" required minlength="2">
                    <div class="error-msg" id="apellidoError">Mínimo 2 caracteres.</div>
                </div>
            </div>

            <div class="form-group">
                <label for="email">Correo electrónico *</label>
                <input type="email" id="email" th:field="*{email}" placeholder="ejemplo@correo.com" required>
                <div class="error-msg" id="emailError">Ingresa un correo válido.</div>
            </div>

            <div class="form-group">
                <label for="password">Contraseña *</label>
                <input type="password" id="password" th:field="*{password}" placeholder="Mínimo 6 caracteres" required minlength="6" onkeyup="checkPasswordStrength()">
                <div class="password-strength" id="passwordStrength"></div>
                <div class="error-msg" id="passwordError">Mínimo 6 caracteres.</div>
            </div>

            <div class="form-group">
                <label for="confirmPassword">Confirmar Contraseña *</label>
                <input type="password" id="confirmPassword" placeholder="Repite tu contraseña" required onkeyup="checkPasswordMatch()">
                <div class="error-msg" id="confirmError">Las contraseñas no coinciden.</div>
            </div>

            <div class="form-group">
                <label for="telefono">Teléfono (opcional)</label>
                <input type="text" id="telefono" th:field="*{telefono}" placeholder="0000-0000">
            </div>

            <div class="form-group">
                <label for="rolId">Tipo de cuenta *</label>
                <select id="rolId" th:field="*{rolId}" required>
                    <option value="">Selecciona un tipo</option>
                    <option value="3">Alumno</option>
                    <option value="2">Profesor</option>
                    <option value="4">Padre de familia</option>
                </select>
            </div>

            <button type="submit" class="btn-register" id="submitBtn">📝 Crear Cuenta</button>
        </form>

        <div class="login-link">
            ¿Ya tienes cuenta? <a href="/auth/login">Iniciar sesión</a>
        </div>
    </div>

    <script>
        function checkPasswordMatch() {
            var pwd = document.getElementById("password").value;
            var confirm = document.getElementById("confirmPassword").value;
            var confirmInput = document.getElementById("confirmPassword");
            var errorMsg = document.getElementById("confirmError");
            
            if (confirm.length > 0 && pwd !== confirm) {
                confirmInput.classList.add("error");
                confirmInput.classList.remove("success");
                errorMsg.style.display = "block";
            } else if (confirm.length > 0 && pwd === confirm) {
                confirmInput.classList.remove("error");
                confirmInput.classList.add("success");
                errorMsg.style.display = "none";
            } else {
                confirmInput.classList.remove("error", "success");
                errorMsg.style.display = "none";
            }
        }

        function checkPasswordStrength() {
            var pwd = document.getElementById("password").value;
            var strength = document.getElementById("passwordStrength");
            
            if (pwd.length === 0) {
                strength.style.width = "0%";
            } else if (pwd.length < 4) {
                strength.style.width = "25%";
                strength.style.background = "#e53e3e";
            } else if (pwd.length < 6) {
                strength.style.width = "50%";
                strength.style.background = "#dd6b20";
            } else if (pwd.length < 8) {
                strength.style.width = "75%";
                strength.style.background = "#d69e2e";
            } else {
                strength.style.width = "100%";
                strength.style.background = "#38a169";
            }
            
            checkPasswordMatch();
        }

        document.getElementById("registroForm").addEventListener("submit", function(e) {
            var pwd = document.getElementById("password").value;
            var confirm = document.getElementById("confirmPassword").value;
            
            if (pwd !== confirm) {
                e.preventDefault();
                alert("Las contraseñas no coinciden. Por favor, verifica.");
                document.getElementById("confirmError").style.display = "block";
                document.getElementById("confirmPassword").classList.add("error");
            }
        });
    </script>
</body>
</html>
