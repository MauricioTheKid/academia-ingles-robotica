<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Registro - Academia San Luis</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
    <style>
      body {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        display: flex;
        align-items: center;
        font-family: "Segoe UI", sans-serif;
      }
      .register-card {
        background: white;
        border-radius: 20px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
        padding: 40px;
        max-width: 500px;
        width: 100%;
        margin: 20px auto;
      }
      .register-card h2 {
        color: #1a3a5c;
        text-align: center;
        margin-bottom: 10px;
      }
      .register-card .subtitle {
        text-align: center;
        color: #718096;
        margin-bottom: 30px;
      }
      .form-control,
      .form-select {
        border-radius: 10px;
        padding: 12px 15px;
        border: 2px solid #e2e8f0;
        transition: all 0.3s;
      }
      .form-control:focus,
      .form-select:focus {
        border-color: #667eea;
        box-shadow: 0 0 0 0.2rem rgba(102, 126, 234, 0.25);
      }
      .btn-register {
        background: linear-gradient(45deg, #667eea, #764ba2);
        border: none;
        border-radius: 50px;
        padding: 14px;
        font-weight: bold;
        font-size: 1.1rem;
        width: 100%;
        color: white;
        transition: transform 0.2s;
      }
      .btn-register:hover {
        transform: scale(1.02);
      }
      .login-link {
        text-align: center;
        margin-top: 20px;
      }
      .login-link a {
        color: #667eea;
        text-decoration: none;
        font-weight: bold;
      }
      .alert {
        border-radius: 10px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="register-card">
        <h2><i class="fas fa-user-plus me-2"></i>Crear Cuenta</h2>
        <p class="subtitle">Únete a Academia San Luis</p>

        <!-- Mensaje de error -->
        <div th:if="${error}" class="alert alert-danger">
          <i class="fas fa-exclamation-triangle me-2"></i>
          <span th:text="${error}"></span>
        </div>

        <form
          th:action="@{/auth/registro}"
          th:object="${registroRequest}"
          method="post"
        >
          <!-- Nombre -->
          <div class="mb-3">
            <label class="form-label fw-bold">
              <i class="fas fa-user me-2"></i>Nombre
            </label>
            <input
              type="text"
              class="form-control"
              th:field="*{nombre}"
              placeholder="Tu nombre"
              required
            />
          </div>

          <!-- Apellido -->
          <div class="mb-3">
            <label class="form-label fw-bold">
              <i class="fas fa-user me-2"></i>Apellido
            </label>
            <input
              type="text"
              class="form-control"
              th:field="*{apellido}"
              placeholder="Tu apellido"
              required
            />
          </div>

          <!-- Email -->
          <div class="mb-3">
            <label class="form-label fw-bold">
              <i class="fas fa-envelope me-2"></i>Email
            </label>
            <input
              type="email"
              class="form-control"
              th:field="*{email}"
              placeholder="correo@ejemplo.com"
              required
            />
          </div>

          <!-- Teléfono -->
          <div class="mb-3">
            <label class="form-label fw-bold">
              <i class="fas fa-phone me-2"></i>Teléfono
            </label>
            <input
              type="tel"
              class="form-control"
              th:field="*{telefono}"
              placeholder="Ej: 7890-1234"
            />
          </div>

          <!-- Contraseña -->
          <div class="mb-3">
            <label class="form-label fw-bold">
              <i class="fas fa-lock me-2"></i>Contraseña
            </label>
            <input
              type="password"
              class="form-control"
              th:field="*{password}"
              placeholder="Mínimo 6 caracteres"
              required
            />
          </div>

          <!-- Rol -->
          <div class="mb-3">
            <label class="form-label fw-bold">
              <i class="fas fa-user-tag me-2"></i>Tipo de Usuario
            </label>
            <select class="form-select" th:field="*{rolId}" id="rolId" required>
              <option value="">Selecciona un rol...</option>
              <option
                th:each="rol : ${roles}"
                th:value="${rol.id}"
                th:text="${rol.nombre}"
              ></option>
            </select>
          </div>

          <!-- Email del Padre (visible solo para ALUMNO) -->
          <div class="mb-3" id="campoPadre" style="display: none">
            <label class="form-label fw-bold">
              <i class="fas fa-user-tie me-2"></i>Email del Padre o Tutor
              <span class="text-muted">(opcional)</span>
            </label>
            <input
              type="email"
              class="form-control"
              name="emailPadre"
              placeholder="Ej: padre@email.com"
            />
            <small class="text-muted">
              <i class="fas fa-info-circle me-1"></i>
              Si ya existe un padre registrado con este email, se vinculará
              automáticamente. Si no existe, se creará una cuenta para él y
              recibirá sus credenciales por correo.
            </small>
          </div>

          <!-- Botón de registro -->
          <button type="submit" class="btn btn-register mt-3">
            <i class="fas fa-user-plus me-2"></i>Crear Cuenta
          </button>
        </form>

        <!-- Link a login -->
        <div class="login-link">
          <p>¿Ya tienes cuenta? <a href="/auth/login">Inicia sesión aquí</a></p>
        </div>
      </div>
    </div>

    <!-- Script para mostrar/ocultar campo de padre -->
    <script>
      document.addEventListener("DOMContentLoaded", function () {
        var selectRol = document.getElementById("rolId");
        var campoPadre = document.getElementById("campoPadre");

        function toggleCampoPadre() {
          if (selectRol && selectRol.options[selectRol.selectedIndex]) {
            var selectedText = selectRol.options[selectRol.selectedIndex].text;
            if (selectedText.includes("ALUMNO")) {
              campoPadre.style.display = "block";
            } else {
              campoPadre.style.display = "none";
            }
          }
        }

        if (selectRol) {
          selectRol.addEventListener("change", toggleCampoPadre);
          toggleCampoPadre(); // Ejecutar al cargar la página
        }
      });
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
