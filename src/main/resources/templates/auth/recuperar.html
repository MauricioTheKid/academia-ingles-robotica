<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Contraseña - Academia San Luis</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:'Segoe UI',sans-serif;background:linear-gradient(135deg,#1a3a5c,#2c5282,#3182ce);min-height:100vh;display:flex;justify-content:center;align-items:center;padding:20px;}
        .container{background:white;border-radius:16px;box-shadow:0 20px 60px rgba(0,0,0,0.3);width:100%;max-width:420px;padding:40px;}
        h1{color:#1a3a5c;text-align:center;margin-bottom:10px;}
        p{color:#718096;text-align:center;margin-bottom:20px;}
        .form-group{margin-bottom:15px;}
        .form-group label{display:block;font-weight:600;margin-bottom:4px;color:#2d3748;}
        .form-group input{width:100%;padding:12px;border:2px solid #e2e8f0;border-radius:8px;font-size:0.95rem;}
        .btn{width:100%;padding:13px;background:#3182ce;color:white;border:none;border-radius:8px;font-weight:600;cursor:pointer;font-size:1rem;}
        .alert{padding:12px;border-radius:8px;margin-bottom:15px;font-size:0.85rem;}
        .alert-success{background:#f0fff4;color:#276749;border:1px solid #9ae6b4;}
        .alert-danger{background:#fff5f5;color:#c53030;border:1px solid #feb2b2;}
        .link{text-align:center;margin-top:15px;}
        .link a{color:#3182ce;text-decoration:none;font-weight:600;}
    </style>
</head>
<body>
    <div class="container">
        <h1>🔑 Recuperar Contraseña</h1>
        <p>Ingresa tu correo y te enviaremos un enlace.</p>
        <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
        <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
        <form th:action="@{/auth/recuperar}" method="post">
            <div class="form-group"><label>Email</label><input type="email" name="email" required></div>
            <button type="submit" class="btn">📧 Enviar Enlace</button>
        </form>
        <div class="link"><a href="/auth/login">← Volver al login</a></div>
    </div>
</body>
</html>
