<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Materiales - Academia San Luis</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:'Segoe UI',sans-serif;background:#f7fafc;display:flex;}
        .sidebar{width:250px;background:#276749;min-height:100vh;padding:20px;color:white;}
        .sidebar h2{font-size:1.2rem;margin-bottom:25px;}
        .sidebar a{display:block;color:#e2e8f0;text-decoration:none;padding:10px;margin:5px 0;border-radius:6px;}
        .sidebar a:hover{background:#38a169;}
        .main{flex:1;padding:30px;}
        .header{background:white;padding:20px;border-radius:10px;margin-bottom:25px;}
        h1{color:#1a3a5c;}
        .card{background:white;padding:20px;border-radius:10px;margin-bottom:20px;box-shadow:0 2px 8px rgba(0,0,0,0.08);}
        table{width:100%;border-collapse:collapse;}
        th,td{padding:10px;text-align:left;border-bottom:1px solid #e2e8f0;}
        th{background:#edf2f7;}
        .btn-descargar{background:#3182ce;color:white;padding:4px 10px;border-radius:4px;text-decoration:none;font-size:0.75rem;}
        .btn-enlace{background:#805ad5;color:white;padding:4px 10px;border-radius:4px;text-decoration:none;font-size:0.75rem;}
        .btn-eliminar{background:#e53e3e;color:white;padding:4px 10px;border-radius:4px;text-decoration:none;font-size:0.75rem;margin-left:4px;}
        .form-group{margin-bottom:12px;}
        .form-group label{display:block;font-weight:600;margin-bottom:3px;}
        .form-group input,.form-group select,.form-group textarea{width:100%;padding:8px;border:2px solid #e2e8f0;border-radius:6px;}
        .btn-subir{background:#38a169;color:white;padding:10px 20px;border:none;border-radius:6px;font-weight:600;cursor:pointer;}
        .alert{padding:12px 15px;border-radius:8px;margin-bottom:15px;font-size:0.9rem;}
        .alert-success{background:#f0fff4;color:#276749;border:1px solid #9ae6b4;}
        .alert-danger{background:#fff5f5;color:#c53030;border:1px solid #feb2b2;}
    </style>
</head>
<body>
    <div class="sidebar">
        <h2>👨‍🏫 San Luis</h2>
        <a href="/">🏠 Inicio</a>
        <a href="/cursos">📚 Cursos</a>
        <a href="/materiales">📁 Materiales</a>
        <a href="/perfil">👤 Mi Perfil</a>
        <a href="/auth/logout">🚪 Salir</a>
    </div>
    <div class="main">
        <div class="header"><h1>📁 Materiales del Curso</h1></div>

        <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
        <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

        <div class="card">
            <h2>📤 Subir Material</h2>
            <form th:action="@{/materiales/subir}" method="post" enctype="multipart/form-data">
                <div class="form-group"><label>Título</label><input type="text" name="titulo" required></div>
                <div class="form-group"><label>Descripción</label><textarea name="descripcion" rows="2"></textarea></div>
                <div class="form-group">
                    <label>Curso</label>
                    <select name="cursoId" required>
                        <option value="">Seleccione</option>
                        <option th:each="curso : ${cursos}" th:value="${curso.id}" th:text="${curso.nombre}">Curso</option>
                    </select>
                </div>
                <div class="form-group"><label>Archivo (PDF, DOC, IMG, etc.)</label><input type="file" name="archivo"></div>
                <div class="form-group"><label>O pega un enlace (YouTube, Drive, etc.)</label><input type="url" name="enlace" placeholder="https://..."></div>
                <button type="submit" class="btn-subir">📤 Subir Material</button>
            </form>
        </div>

        <div class="card">
            <h2>📚 Materiales Disponibles</h2>
            <table>
                <thead><tr><th>Título</th><th>Curso</th><th>Tipo</th><th>Fecha</th><th>Acción</th></tr></thead>
                <tbody>
                    <tr th:each="material : ${materiales}">
                        <td th:text="${material.titulo}">Título</td>
                        <td th:text="${material.curso.nombre}">Curso</td>
                        <td>
                            <span th:if="${material.enlace != null}">🔗 Enlace</span>
                            <span th:if="${material.nombreArchivo != null}">📎 Archivo</span>
                        </td>
                        <td th:text="${#temporals.format(material.fechaSubida, 'dd/MM/yyyy')}">Fecha</td>
                        <td>
                            <a th:if="${material.nombreArchivo != null}" th:href="@{/uploads/{file}(file=${material.nombreArchivo})}" class="btn-descargar" download>⬇</a>
                            <a th:if="${material.enlace != null}" th:href="${material.enlace}" target="_blank" class="btn-enlace">🔗</a>
                            <a th:href="@{/materiales/eliminar/{id}(id=${material.id})}" class="btn-eliminar" onclick="return confirm('¿Eliminar este material?')">🗑️</a>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(materiales)}">
                        <td colspan="5" style="text-align:center;">No hay materiales aún.</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
