<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calificar Alumno</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: "Segoe UI", sans-serif;
        background: #f7fafc;
        display: flex;
      }
      .sidebar {
        width: 250px;
        background: linear-gradient(180deg, #1a3a5c 0%, #2c5282 100%);
        min-height: 100vh;
        padding: 20px;
        color: white;
        position: fixed;
        left: 0;
        top: 0;
        bottom: 0;
      }
      .sidebar h2 {
        font-size: 1.3rem;
        margin-bottom: 25px;
        padding-bottom: 15px;
        border-bottom: 2px solid rgba(255, 255, 255, 0.2);
      }
      .sidebar a {
        display: block;
        color: #e2e8f0;
        text-decoration: none;
        padding: 12px 15px;
        margin: 5px 0;
        border-radius: 8px;
        transition: all 0.3s;
      }
      .sidebar a:hover {
        background: rgba(255, 255, 255, 0.15);
        color: white;
        transform: translateX(5px);
      }
      .main {
        flex: 1;
        padding: 30px;
        margin-left: 250px;
      }
      .form-card {
        background: white;
        border-radius: 15px;
        padding: 30px;
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.05);
        max-width: 800px;
      }
      .nota-input {
        width: 80px;
        text-align: center;
        font-size: 1.2rem;
        border-radius: 10px;
      }
      .btn-save {
        background: linear-gradient(45deg, #11998e, #38ef7d);
        color: white;
        border: none;
        border-radius: 25px;
        padding: 12px 35px;
        font-size: 1.1rem;
        cursor: pointer;
      }
      .btn-save:hover {
        transform: scale(1.05);
      }
      .error-message {
        color: #dc3545;
        font-size: 0.85rem;
        margin-top: 5px;
      }
    </style>
  </head>
  <body>
    <div class="sidebar">
      <h2><i class="fas fa-chalkboard-teacher me-2"></i>Profesor</h2>
      <a href="/profesor/dashboard"
        ><i class="fas fa-tachometer-alt me-2"></i>Dashboard</a
      >
      <a href="/profesor/alumnos"
        ><i class="fas fa-users me-2"></i>Mis Alumnos</a
      >
      <a href="/profesor/calificaciones"
        ><i class="fas fa-star me-2"></i>Calificaciones</a
      >
      <a href="/perfil"><i class="fas fa-user me-2"></i>Mi Perfil</a>
      <a href="/auth/logout"><i class="fas fa-sign-out-alt me-2"></i>Salir</a>
    </div>

    <div class="main">
      <h2 class="mb-4" style="color: #1a3a5c">
        <i class="fas fa-edit me-2"></i>Calificar Alumno
      </h2>

      <!-- Mensajes de éxito/error -->
      <div
        th:if="${success}"
        class="alert alert-success alert-dismissible fade show"
        role="alert"
      >
        <i class="fas fa-check-circle me-2"></i
        ><span th:text="${success}"></span>
        <button
          type="button"
          class="btn-close"
          data-bs-dismiss="alert"
        ></button>
      </div>
      <div
        th:if="${error}"
        class="alert alert-danger alert-dismissible fade show"
        role="alert"
      >
        <i class="fas fa-exclamation-circle me-2"></i
        ><span th:text="${error}"></span>
        <button
          type="button"
          class="btn-close"
          data-bs-dismiss="alert"
        ></button>
      </div>

      <div class="alert alert-info mb-4">
        <strong><i class="fas fa-user me-2"></i>Alumno:</strong>
        <span
          th:text="${inscripcion.usuario.nombre} + ' ' + ${inscripcion.usuario.apellido}"
        ></span
        ><br />
        <strong><i class="fas fa-book me-2"></i>Curso:</strong>
        <span th:text="${inscripcion.curso.nombre}"></span><br />
        <strong><i class="fas fa-calendar me-2"></i>Inscripción ID:</strong>
        <span th:text="${inscripcion.id}"></span>
      </div>

      <div class="form-card">
        <form
          th:action="@{/profesor/calificar/{id}(id=${inscripcion.id})}"
          method="post"
          id="formCalificar"
          onsubmit="return validarFormulario();"
        >
          <h5 class="mb-4">
            <i class="fas fa-clipboard-list me-2"></i>Evaluaciones Parciales
          </h5>

          <div class="row mb-4">
            <div class="col-md-3 text-center">
              <label class="form-label fw-bold">Parcial 1</label>
              <input
                type="number"
                class="form-control nota-input mx-auto"
                name="notaParcial1"
                id="notaParcial1"
                min="0"
                max="10"
                step="0.1"
                th:value="${calificacion.notaParcial1 != null ? calificacion.notaParcial1 : ''}"
                placeholder="0.0"
              />
              <div class="error-message" id="errorParcial1"></div>
            </div>
            <div class="col-md-3 text-center">
              <label class="form-label fw-bold">Parcial 2</label>
              <input
                type="number"
                class="form-control nota-input mx-auto"
                name="notaParcial2"
                id="notaParcial2"
                min="0"
                max="10"
                step="0.1"
                th:value="${calificacion.notaParcial2 != null ? calificacion.notaParcial2 : ''}"
                placeholder="0.0"
              />
            </div>
            <div class="col-md-3 text-center">
              <label class="form-label fw-bold">Parcial 3</label>
              <input
                type="number"
                class="form-control nota-input mx-auto"
                name="notaParcial3"
                id="notaParcial3"
                min="0"
                max="10"
                step="0.1"
                th:value="${calificacion.notaParcial3 != null ? calificacion.notaParcial3 : ''}"
                placeholder="0.0"
              />
            </div>
            <div class="col-md-3 text-center">
              <label class="form-label fw-bold">Parcial 4</label>
              <input
                type="number"
                class="form-control nota-input mx-auto"
                name="notaParcial4"
                id="notaParcial4"
                min="0"
                max="10"
                step="0.1"
                th:value="${calificacion.notaParcial4 != null ? calificacion.notaParcial4 : ''}"
                placeholder="0.0"
              />
            </div>
          </div>

          <h5 class="mb-3">
            <i class="fas fa-project-diagram me-2"></i>Proyecto y Examen Final
          </h5>

          <div class="row mb-4">
            <div class="col-md-6 text-center">
              <label class="form-label fw-bold">Proyecto</label>
              <input
                type="number"
                class="form-control nota-input mx-auto"
                name="notaProyecto"
                id="notaProyecto"
                min="0"
                max="10"
                step="0.1"
                th:value="${calificacion.notaProyecto != null ? calificacion.notaProyecto : ''}"
                placeholder="0.0"
              />
            </div>
            <div class="col-md-6 text-center">
              <label class="form-label fw-bold">Examen Final</label>
              <input
                type="number"
                class="form-control nota-input mx-auto"
                name="notaExamenFinal"
                id="notaExamenFinal"
                min="0"
                max="10"
                step="0.1"
                th:value="${calificacion.notaExamenFinal != null ? calificacion.notaExamenFinal : ''}"
                placeholder="0.0"
              />
            </div>
          </div>

          <div class="mb-4">
            <label class="form-label fw-bold">
              <i class="fas fa-comment me-2"></i>Observaciones
            </label>
            <textarea
              class="form-control"
              name="observaciones"
              id="observaciones"
              rows="3"
              th:text="${calificacion.observaciones}"
              placeholder="Comentarios sobre el desempeño del alumno..."
            ></textarea>
          </div>

          <div class="d-flex gap-3">
            <button type="submit" class="btn-save">
              <i class="fas fa-save me-2"></i>Guardar Calificaciones
            </button>
            <a href="/profesor/calificaciones" class="btn btn-secondary btn-lg">
              <i class="fas fa-arrow-left me-2"></i>Cancelar
            </a>
          </div>
        </form>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
      function validarFormulario() {
        const campos = [
          "notaParcial1",
          "notaParcial2",
          "notaParcial3",
          "notaParcial4",
          "notaProyecto",
          "notaExamenFinal",
        ];
        let valido = true;

        campos.forEach((campo) => {
          const input = document.getElementById(campo);
          const valor = input.value.trim();

          if (valor !== "") {
            const num = parseFloat(valor);
            if (isNaN(num) || num < 0 || num > 10) {
              input.style.borderColor = "#dc3545";
              valido = false;
            } else {
              input.style.borderColor = "#ced4da";
            }
          } else {
            // Permitir campos vacíos (no obligatorios)
            input.style.borderColor = "#ced4da";
          }
        });

        if (!valido) {
          alert(
            "❌ Algunas notas están fuera del rango permitido (0-10). Por favor corrige los valores marcados en rojo.",
          );
        }

        return valido;
      }
    </script>
  </body>
</html>
