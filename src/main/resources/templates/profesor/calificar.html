<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calificar Alumno</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #f7fafc; display: flex; }
        .sidebar { width: 250px; background: linear-gradient(180deg, #1a3a5c 0%, #2c5282 100%); min-height: 100vh; padding: 20px; color: white; position: fixed; left: 0; top: 0; bottom: 0; }
        .sidebar h2 { font-size: 1.3rem; margin-bottom: 25px; padding-bottom: 15px; border-bottom: 2px solid rgba(255,255,255,0.2); }
        .sidebar a { display: block; color: #e2e8f0; text-decoration: none; padding: 12px 15px; margin: 5px 0; border-radius: 8px; transition: all 0.3s; }
        .sidebar a:hover { background: rgba(255,255,255,0.15); color: white; transform: translateX(5px); }
        .main { flex: 1; padding: 30px; margin-left: 250px; }
        
        .form-card { background: white; border-radius: 15px; padding: 30px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); max-width: 800px; }
        
        .nota-input { width: 80px; text-align: center; font-size: 1.2rem; border-radius: 10px; }
        
        .btn-save { 
            background: linear-gradient(45deg, #11998e, #38ef7d); 
            color: white; 
            border: none; 
            border-radius: 25px; 
            padding: 12px 35px;
            font-size: 1.1rem;
            transition: all 0.3s;
        }
        .btn-save:hover { transform: scale(1.05); color: white; }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2><i class="fas fa-chalkboard-teacher me-2"></i>Profesor</h2>
        <a href="/profesor/dashboard"><i class="fas fa-tachometer-alt me-2"></i>Dashboard</a>
        <a href="/profesor/alumnos"><i class="fas fa-users me-2"></i>Mis Alumnos</a>
        <a href="/profesor/calificaciones"><i class="fas fa-star me-2"></i>Calificaciones</a>
        <a href="/auth/logout"><i class="fas fa-sign-out-alt me-2"></i>Salir</a>
    </div>

    <div class="main">
        <h2 class="mb-4" style="color: #1a3a5c;">
            <i class="fas fa-edit me-2"></i>Calificar Alumno
        </h2>

        <div class="alert alert-info mb-4">
            <strong><i class="fas fa-user me-2"></i>Alumno:</strong> 
            <span th:text="${inscripcion.usuario.nombre} + ' ' + ${inscripcion.usuario.apellido}"></span>
            <br>
            <strong><i class="fas fa-book me-2"></i>Curso:</strong> 
            <span th:text="${inscripcion.curso.nombre}"></span>
            <br>
            <strong><i class="fas fa-calendar me-2"></i>Horario:</strong> 
            <span th:text="${inscripcion.reserva.horario.diaSemana} + ' ' + ${inscripcion.reserva.horario.horaInicio} + ' - ' + ${inscripcion.reserva.horario.horaFin}"></span>
        </div>

        <div class="form-card">
            <form th:action="@{/profesor/calificar/{id}(id=${inscripcion.id})}" method="post">
                <h5 class="mb-4"><i class="fas fa-clipboard-list me-2"></i>Evaluaciones Parciales</h5>
                
                <div class="row mb-4">
                    <div class="col-md-3 text-center">
                        <label class="form-label fw-bold">Parcial 1</label>
                        <input type="number" class="form-control nota-input mx-auto" 
                               name="notaParcial1" min="0" max="10" step="0.1"
                               th:value="${calificacion.notaParcial1}" placeholder="0.0">
                    </div>
                    <div class="col-md-3 text-center">
                        <label class="form-label fw-bold">Parcial 2</label>
                        <input type="number" class="form-control nota-input mx-auto" 
                               name="notaParcial2" min="0" max="10" step="0.1"
                               th:value="${calificacion.notaParcial2}" placeholder="0.0">
                    </div>
                    <div class="col-md-3 text-center">
                        <label class="form-label fw-bold">Parcial 3</label>
                        <input type="number" class="form-control nota-input mx-auto" 
                               name="notaParcial3" min="0" max="10" step="0.1"
                               th:value="${calificacion.notaParcial3}" placeholder="0.0">
                    </div>
                    <div class="col-md-3 text-center">
                        <label class="form-label fw-bold">Parcial 4</label>
                        <input type="number" class="form-control nota-input mx-auto" 
                               name="notaParcial4" min="0" max="10" step="0.1"
                               th:value="${calificacion.notaParcial4}" placeholder="0.0">
                    </div>
                </div>

                <h5 class="mb-3"><i class="fas fa-project-diagram me-2"></i>Proyecto y Examen Final</h5>
                
                <div class="row mb-4">
                    <div class="col-md-6 text-center">
                        <label class="form-label fw-bold">Proyecto</label>
                        <input type="number" class="form-control nota-input mx-auto" 
                               name="notaProyecto" min="0" max="10" step="0.1"
                               th:value="${calificacion.notaProyecto}" placeholder="0.0">
                    </div>
                    <div class="col-md-6 text-center">
                        <label class="form-label fw-bold">Examen Final</label>
                        <input type="number" class="form-control nota-input mx-auto" 
                               name="notaExamenFinal" min="0" max="10" step="0.1"
                               th:value="${calificacion.notaExamenFinal}" placeholder="0.0">
                    </div>
                </div>

                <div class="mb-4">
                    <label class="form-label fw-bold">
                        <i class="fas fa-comment me-2"></i>Observaciones
                    </label>
                    <textarea class="form-control" name="observaciones" rows="3" 
                              th:text="${calificacion.observaciones}"
                              placeholder="Comentarios sobre el desempeño del alumno..."></textarea>
                </div>

                <div class="d-flex gap-3">
                    <button type="submit" class="btn-save">
                        <i class="fas fa-save me-2"></i>Guardar Calificaciones
                    </button>
                    <a href="/profesor/calificaciones" class="btn btn-secondary btn-lg">
                        <i class="fas fa-arrow-left me-2"></i>Cancelar
                    </a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
