<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Perfil - Academia San Luis</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:'Segoe UI',sans-serif;background:#f7fafc;display:flex;}
        .sidebar{width:250px;background:#1a3a5c;min-height:100vh;padding:20px;color:white;}
        .sidebar h2{font-size:1.2rem;margin-bottom:25px;}
        .sidebar a{display:block;color:#e2e8f0;text-decoration:none;padding:10px;margin:5px 0;border-radius:6px;}
        .sidebar a:hover{background:#2c5282;}
        .main{flex:1;padding:30px;}
        .header{background:white;padding:20px;border-radius:10px;margin-bottom:25px;}
        h1{color:#1a3a5c;}
        h2{color:#2c5282;margin:20px 0 10px 0;}
        .card{background:white;padding:25px;border-radius:10px;margin:15px 0;box-shadow:0 2px 8px rgba(0,0,0,0.1);max-width:600px;}
        .form-group{margin-bottom:15px;}
        .form-group label{display:block;font-weight:600;margin-bottom:4px;color:#2d3748;}
        .form-group input{width:100%;padding:10px;border:2px solid #e2e8f0;border-radius:8px;font-size:0.95rem;}
        .btn{padding:12px 25px;border:none;border-radius:8px;font-weight:600;cursor:pointer;color:white;}
        .btn-primary{background:#3182ce;}
        .btn-warning{background:#d69e2e;}
        .alert{padding:12px 15px;border-radius:8px;margin-bottom:15px;font-size:0.85rem;}
        .alert-success{background:#f0fff4;color:#276749;border:1px solid #9ae6b4;}
        .alert-danger{background:#fff5f5;color:#c53030;border:1px solid #feb2b2;}
    </style>
</head>
<body>
    <div class="sidebar">
        <h2>🎓 San Luis</h2>
        <a href="/">🏠 Inicio</a>
        <a href="/cursos">📚 Cursos</a>
        <a href="/reservas">📅 Mis Reservas</a>
        <a href="/perfil">👤 Mi Perfil</a>
        <a href="/auth/logout">🚪 Salir</a>
    </div>
    <div class="main">
        <div class="header"><h1>👤 Mi Perfil</h1></div>

        <div th:if="${success}" class="alert alert-success" th:text="${success}">Éxito</div>
        <div th:if="${error}" class="alert alert-danger" th:text="${error}">Error</div>

        <!-- Datos personales -->
        <div class="card">
            <h2>Datos Personales</h2>
            <form th:action="@{/perfil/actualizar}" th:object="${usuario}" method="post">
                <div class="form-group"><label>Nombre</label><input type="text" th:field="*{nombre}" required></div>
                <div class="form-group"><label>Apellido</label><input type="text" th:field="*{apellido}" required></div>
                <div class="form-group"><label>Email</label><input type="email" th:field="*{email}" readonly style="background:#edf2f7;"></div>
                <div class="form-group"><label>Teléfono</label><input type="text" th:field="*{telefono}"></div>
                <button type="submit" class="btn btn-primary">💾 Guardar Cambios</button>
            </form>
        </div>

        <!-- Cambiar contraseña -->
        <div class="card">
            <h2>Cambiar Contraseña</h2>
            <form th:action="@{/perfil/cambiar-password}" method="post">
                <div class="form-group"><label>Contraseña Actual</label><input type="password" name="passwordActual" required></div>
                <div class="form-group"><label>Nueva Contraseña</label><input type="password" name="passwordNueva" required minlength="6"></div>
                <div class="form-group"><label>Confirmar Nueva</label><input type="password" name="passwordConfirmar" required></div>
                <button type="submit" class="btn btn-warning">🔒 Cambiar Contraseña</button>
            </form>
        </div>
    </div>
</body>
</html>
