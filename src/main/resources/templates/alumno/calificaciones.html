<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis Calificaciones</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; font-family: 'Segoe UI', sans-serif; }
        .container-custom { max-width: 900px; margin: 0 auto; padding: 30px; }
        .card-calificacion { background: white; border-radius: 20px; padding: 30px; margin-bottom: 25px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); }
        
        .nota-circle {
            width: 80px; height: 80px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.8rem; font-weight: bold; color: white;
            margin: 0 auto;
        }
        .aprobado { background: linear-gradient(135deg, #11998e, #38ef7d); }
        .regular { background: linear-gradient(135deg, #f2994a, #f2c94c); }
        .reprobado { background: linear-gradient(135deg, #eb3349, #f45c43); }
        
        .progress { height: 12px; border-radius: 10px; }
    </style>
</head>
<body>
    <div class="container-custom">
        <div class="text-center text-white mb-4">
            <h1><i class="fas fa-star me-2"></i>Mis Calificaciones</h1>
            <p>Consulta tu rendimiento académico</p>
        </div>

        <div th:if="${#lists.isEmpty(calificaciones)}" class="card-calificacion text-center py-5">
            <i class="fas fa-clipboard-list fa-4x text-muted mb-3"></i>
            <h4 class="text-muted">Aún no tienes calificaciones registradas</h4>
            <p>Tu profesor asignará las notas próximamente</p>
            <a href="/alumno/dashboard" class="btn btn-primary mt-3">
                <i class="fas fa-arrow-left me-2"></i>Volver al Dashboard
            </a>
        </div>

        <div th:each="cal : ${calificaciones}" class="card-calificacion">
            <div class="row align-items-center">
                <div class="col-md-3 text-center">
                    <div class="nota-circle" th:classappend="${cal.colorEstado}">
                        <span th:text="${cal.promedio}">0.0</span>
                    </div>
                    <span class="badge mt-2" 
                          th:classappend="'bg-' + ${cal.colorEstado}"
                          th:text="${cal.estado}"></span>
                </div>
                <div class="col-md-9">
                    <h4 th:text="${cal.inscripcion.curso.nombre}" style="color: #1a3a5c;"></h4>
                    <p class="text-muted" th:text="${cal.inscripcion.reserva.horario.diaSemana} + ' ' + ${cal.inscripcion.reserva.horario.horaInicio} + ' - ' + ${cal.inscripcion.reserva.horario.horaFin}"></p>
                    
                    <div class="row mt-3">
                        <div class="col-4 text-center" th:each="nota : ${ {'P1': cal.notaParcial1, 'P2': cal.notaParcial2, 'P3': cal.notaParcial3, 'P4': cal.notaParcial4, 'Proy': cal.notaProyecto, 'E.F': cal.notaExamenFinal} }">
                            <small class="text-muted" th:text="${nota.key}"></small><br>
                            <strong th:text="${nota.value != null ? nota.value : '-'}"></strong>
                        </div>
                    </div>
                    
                    <div th:if="${cal.observaciones}" class="alert alert-light mt-3">
                        <i class="fas fa-comment me-2"></i>
                        <span th:text="${cal.observaciones}"></span>
                    </div>
                </div>
            </div>
        </div>

        <div class="text-center mt-4">
            <a href="/alumno/dashboard" class="btn btn-light btn-lg">
                <i class="fas fa-arrow-left me-2"></i>Volver al Dashboard
            </a>
        </div>
    </div>
</body>
</html>
