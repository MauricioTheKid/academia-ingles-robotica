<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mis Calificaciones</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        font-family: "Segoe UI", sans-serif;
      }
      .container-custom {
        max-width: 900px;
        margin: 0 auto;
        padding: 30px;
      }

      .card-calificacion {
        background: white;
        border-radius: 20px;
        padding: 30px;
        margin-bottom: 25px;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
      }

      /* CÍRCULO DEL PROMEDIO - COLORES CORREGIDOS */
      .nota-circle {
        width: 90px;
        height: 90px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 2rem;
        font-weight: bold;
        color: white;
        margin: 0 auto;
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
      }
      /* Colores que coinciden con getColorEstado() */
      .nota-circle.success {
        background: linear-gradient(135deg, #11998e, #38ef7d);
      }
      .nota-circle.warning {
        background: linear-gradient(135deg, #f2994a, #f2c94c);
        color: #333;
      }
      .nota-circle.danger {
        background: linear-gradient(135deg, #eb3349, #f45c43);
      }
      .nota-circle.secondary {
        background: linear-gradient(135deg, #6c757d, #adb5bd);
      }

      /* BADGE DE ESTADO */
      .badge-estado {
        display: inline-block;
        padding: 8px 20px;
        border-radius: 20px;
        font-weight: bold;
        font-size: 0.9rem;
        margin-top: 10px;
      }
      .badge-estado.success {
        background: #28a745;
        color: white;
      }
      .badge-estado.warning {
        background: #ffc107;
        color: #333;
      }
      .badge-estado.danger {
        background: #dc3545;
        color: white;
      }
      .badge-estado.secondary {
        background: #6c757d;
        color: white;
      }

      .nota-item {
        text-align: center;
        padding: 5px;
      }
      .nota-item small {
        color: #6c757d;
        font-size: 0.75rem;
      }
      .nota-item strong {
        font-size: 1.1rem;
      }

      .btn-volver {
        background: white;
        color: #667eea;
        border: none;
        border-radius: 30px;
        padding: 12px 30px;
        font-weight: bold;
        transition: all 0.3s;
        text-decoration: none;
        display: inline-block;
      }
      .btn-volver:hover {
        transform: scale(1.05);
        box-shadow: 0 5px 20px rgba(0, 0, 0, 0.2);
        color: #667eea;
      }
    </style>
  </head>
  <body>
    <div class="container-custom">
      <div class="text-center text-white mb-4">
        <h1><i class="fas fa-star me-2"></i>Mis Calificaciones</h1>
        <p>Consulta tu rendimiento académico</p>
      </div>

      <!-- SIN CALIFICACIONES -->
      <div
        th:if="${#lists.isEmpty(calificaciones)}"
        class="card-calificacion text-center py-5"
      >
        <i class="fas fa-clipboard-list fa-4x text-muted mb-3"></i>
        <h4 class="text-muted">Aún no tienes calificaciones registradas</h4>
        <p>Tu profesor asignará las notas próximamente</p>
        <a href="/alumno/dashboard" class="btn btn-primary mt-3">
          <i class="fas fa-arrow-left me-2"></i>Volver al Dashboard
        </a>
      </div>

      <!-- CALIFICACIONES -->
      <div th:each="cal : ${calificaciones}" class="card-calificacion">
        <div class="row align-items-center">
          <!-- COLUMNA IZQUIERDA: PROMEDIO Y ESTADO -->
          <div class="col-md-3 text-center">
            <!-- CÍRCULO CON PROMEDIO - CORREGIDO -->
            <div
              class="nota-circle"
              th:class="'nota-circle ' + ${cal.colorEstado}"
            >
              <span th:text="${cal.promedio}">0.0</span>
            </div>
            <!-- BADGE DE ESTADO -->
            <span
              class="badge-estado"
              th:class="'badge-estado ' + ${cal.colorEstado}"
              th:text="${cal.estado}"
            ></span>
          </div>

          <!-- COLUMNA DERECHA: DETALLES -->
          <div class="col-md-9">
            <h4
              th:text="${cal.inscripcion.curso.nombre}"
              style="color: #1a3a5c"
            ></h4>
            <p class="text-muted">
              <i class="fas fa-calendar-alt me-1"></i>
              <span
                th:text="${cal.inscripcion.reserva.horario.diaSemana} + ' ' + ${cal.inscripcion.reserva.horario.horaInicio} + ' - ' + ${cal.inscripcion.reserva.horario.horaFin}"
              ></span>
            </p>

            <!-- NOTAS EN GRILLA -->
            <div class="row mt-3">
              <div class="col-4 col-md-2 nota-item">
                <small>P1</small><br />
                <strong
                  th:text="${cal.notaParcial1 != null ? cal.notaParcial1 : '-'}"
                ></strong>
              </div>
              <div class="col-4 col-md-2 nota-item">
                <small>P2</small><br />
                <strong
                  th:text="${cal.notaParcial2 != null ? cal.notaParcial2 : '-'}"
                ></strong>
              </div>
              <div class="col-4 col-md-2 nota-item">
                <small>P3</small><br />
                <strong
                  th:text="${cal.notaParcial3 != null ? cal.notaParcial3 : '-'}"
                ></strong>
              </div>
              <div class="col-4 col-md-2 nota-item">
                <small>P4</small><br />
                <strong
                  th:text="${cal.notaParcial4 != null ? cal.notaParcial4 : '-'}"
                ></strong>
              </div>
              <div class="col-4 col-md-2 nota-item">
                <small>Proy</small><br />
                <strong
                  th:text="${cal.notaProyecto != null ? cal.notaProyecto : '-'}"
                ></strong>
              </div>
              <div class="col-4 col-md-2 nota-item">
                <small>E.F</small><br />
                <strong
                  th:text="${cal.notaExamenFinal != null ? cal.notaExamenFinal : '-'}"
                ></strong>
              </div>
            </div>

            <!-- OBSERVACIONES -->
            <div th:if="${cal.observaciones}" class="alert alert-light mt-3">
              <i class="fas fa-comment me-2"></i>
              <span th:text="${cal.observaciones}"></span>
            </div>
          </div>
        </div>
      </div>

      <!-- BOTÓN VOLVER -->
      <div class="text-center mt-4">
        <a href="/alumno/dashboard" class="btn-volver">
          <i class="fas fa-arrow-left me-2"></i>Volver al Dashboard
        </a>
      </div>
    </div>
  </body>
</html>
