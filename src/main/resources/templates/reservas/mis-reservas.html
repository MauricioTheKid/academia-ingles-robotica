<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis Reservas - Academia San Luis</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:'Segoe UI',sans-serif;background:#f7fafc;display:flex;}
        .sidebar{width:250px;background:#1a3a5c;min-height:100vh;padding:20px;color:white;}
        .sidebar h2{font-size:1.2rem;margin-bottom:25px;}
        .sidebar a{display:block;color:#e2e8f0;text-decoration:none;padding:10px;margin:5px 0;border-radius:6px;}
        .sidebar a:hover{background:#2c5282;}
        .main{flex:1;padding:30px;}
        .header{background:white;padding:20px;border-radius:10px;margin-bottom:25px;}
        h1{color:#1a3a5c;}
        table{width:100%;border-collapse:collapse;background:white;border-radius:10px;overflow:hidden;}
        th,td{padding:12px;text-align:left;border-bottom:1px solid #e2e8f0;}
        th{background:#edf2f7;}
        .badge{padding:4px 10px;border-radius:20px;font-size:0.8rem;}
        .badge-success{background:#c6f6d5;color:#276749;}
        .badge-warning{background:#fefcbf;color:#975a16;}
        .badge-danger{background:#fed7d7;color:#9b2c2c;}
        .btn{display:inline-block;padding:6px 12px;border-radius:5px;text-decoration:none;font-size:0.8rem;cursor:pointer;border:none;}
        .btn-primary{background:#3182ce;color:white;}
        .btn-primary:hover{background:#2b6cb0;}
        .btn-sm{padding:4px 8px;font-size:0.75rem;}
        .alert{padding:12px 15px;border-radius:8px;margin-bottom:15px;font-size:0.9rem;font-weight:500;}
        .alert-success{background:#f0fff4;color:#276749;border:1px solid #9ae6b4;}
        .alert-danger{background:#fff5f5;color:#c53030;border:1px solid #feb2b2;}
        .text-muted{color:#718096;}
        .text-danger{color:#e53e3e;}
    </style>
</head>
<body>
    <div class="sidebar">
        <h2>🎓 San Luis</h2>
        <a href="/">🏠 Inicio</a>
        <a href="/cursos">📚 Cursos</a>
        <a href="/reservas">📅 Mis Reservas</a>
        <a href="/perfil">👤 Mi Perfil</a>
        <a href="/auth/logout">🚪 Salir</a>
    </div>
    <div class="main">
        <div class="header"><h1>📅 Mis Reservas</h1></div>

        <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
        <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Usuario</th>
                    <th>Curso</th>
                    <th>Día</th>
                    <th>Horario</th>
                    <th>Estado</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="reserva : ${reservas}">
                    <td th:text="${reserva.id}">1</td>
                    <td th:text="${reserva.usuario.nombre} + ' ' + ${reserva.usuario.apellido}">Usuario</td>
                    <td th:text="${reserva.horario.curso.nombre}">Curso</td>
                    <td th:text="${reserva.horario.diaSemana}">Día</td>
                    <td th:text="${reserva.horario.horaInicio} + ' - ' + ${reserva.horario.horaFin}">Horario</td>
                    <td>
                        <span th:if="${reserva.estado == 'CONFIRMADA'}" class="badge badge-success">Confirmada</span>
                        <span th:if="${reserva.estado == 'PENDIENTE'}" class="badge badge-warning">Pendiente</span>
                        <span th:if="${reserva.estado == 'CANCELADA'}" class="badge badge-danger">Cancelada</span>
                    </td>
                    <td>
                        <!-- Botón para reservas CONFIRMADA - Iniciar inscripción -->
                        <a th:if="${reserva.estado == 'CONFIRMADA'}" 
                           th:href="@{/inscripcion/iniciar/{id}(id=${reserva.id})}" 
                           class="btn btn-primary btn-sm">
                           📝 Completar Inscripción
                        </a>
                        
                        <!-- Mensaje para reservas PENDIENTE -->
                        <span th:if="${reserva.estado == 'PENDIENTE'}" class="text-muted">
                            ⏳ Esperando confirmación
                        </span>
                        
                        <!-- Mensaje para reservas CANCELADA -->
                        <span th:if="${reserva.estado == 'CANCELADA'}" class="text-danger">
                            ❌ Cancelada
                        </span>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(reservas)}">
                    <td colspan="7" style="text-align:center;">No hay reservas registradas.</td>
                </tr>
            </tbody>
        </table>
    </div>
</body>
</html>
